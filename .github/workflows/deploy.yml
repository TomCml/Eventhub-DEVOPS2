name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  unit-tests:
    uses: ./.github/workflows/unittest.yml
    secrets: inherit

  e2e-tests:
    needs: unit-tests
    uses: ./.github/workflows/e2etest.yml
    secrets: inherit

  deploy:
    needs: e2e-tests
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Jenkins deploy
        run: |
          curl -sf "${{ secrets.JENKINS_URL }}/job/EventHub/build?token=${{ secrets.JENKINS_JOB_TOKEN }}" \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_API_TOKEN }}"
